name: Déploiement GitHub Pages

on:
  push:
    branches: [main]
    paths: ['site/**', '.github/workflows/deploy.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      # Checkout sans LFS : on gère le cache des objets audio nous-mêmes pour
      # économiser la bande passante LFS (1 Go/mois en gratuit). Les .m4a ne
      # sont retéléchargés que lorsqu'ils changent.
      - uses: actions/checkout@v4
      - name: Cache des objets LFS (podcasts)
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-${{ hashFiles('site/public/podcasts/*.m4a') }}
      - name: Récupérer les fichiers LFS manquants
        working-directory: ${{ github.workspace }}
        run: git lfs pull
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build
        # Clés Supabase pour la synchro multi-appareils (variables publiques du
        # dépôt → Settings → Secrets and variables → Actions → Variables).
        # Si elles sont absentes, le site se build normalement, synchro désactivée.
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
